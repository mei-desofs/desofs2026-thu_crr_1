name: Functional Tests (Newman)
on:
  workflow_call:

jobs:
  newman:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Newman
        run: npm install -g newman newman-reporter-htmlextra

      - name: Warmup backend (best-effort)
        run: |
          newman run postman/Warmup.postman_collection.json \
            --environment postman/env.postman_environment.json \
            --timeout-request 90000 \
          || true

      - name: Run Postman Collection
        run: |
          newman run postman/Tests.postman_collection.json \
            --environment postman/env.postman_environment.json \
            --reporters cli,junit,htmlextra \
            --reporter-junit-export results/newman-results.xml \
            --reporter-htmlextra-export results/newman-report.html \
            --delay-request 500 \
            --timeout-request 10000

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newman-results
          path: results/

      - name: Publish Newman Results
        if: always()
        uses: mikepenz/action-junit-report@v4
        with:
          report_paths: results/newman-results.xml