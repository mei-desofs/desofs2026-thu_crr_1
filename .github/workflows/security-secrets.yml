name: Security Secrets Scan

on:
  workflow_call:
    secrets:
      GITLEAKS_SHA256:
        description: 'SHA256 checksum for the Gitleaks binary'
        required: true
    
jobs:
  secrets:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Gitleaks
        run: |
          curl -sSL https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz -o gitleaks.tar.gz
          tar -xzf gitleaks.tar.gz
          chmod +x gitleaks
          sudo mv gitleaks /usr/local/bin/

      - name: Verify checksum
        run: |
          echo "Hash length: ${#GITLEAKS_HASH}"
          echo "${GITLEAKS_HASH}  gitleaks.tar.gz" > checksum.txt
          cat checksum.txt   # optional: remove after confirming it works
          sha256sum --check checksum.txt
        env:
          GITLEAKS_HASH: ${{ secrets.GITLEAKS_SHA256 }}

      - name: Verify
        run: gitleaks version

      - name: Run Gitleaks
        run: |
          gitleaks detect \
            --no-git \
            --source backend \
            --report-format sarif \
            --report-path gitleaks.sarif \
            --exit-code 1 \
            --redact

      - name: Upload to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: gitleaks.sarif

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-sarif
          path: gitleaks.sarif