name: Security Secrets Scan

on:
  push:
  pull_request:

jobs:
  secrets:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Secret Detection with TruffleHog
        run: |
          docker run -v "$PWD/backend:/scan" ghcr.io/trufflesecurity/trufflehog:v3.88.15 filesystem /scan --only-verified --json

      - name: Upload report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: secret-scan-report
          path: trufflehog-report.json