name: Security Secrets Scan

on:
  push:
  pull_request:

jobs:
  secrets:
    runs-on: ubuntu-latest
    container: ghcr.io/gitleaks/gitleaks:v8.18.0

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Gitleaks
        run: |
          gitleaks detect \
            --source backend \
            --verbose \
            --report-format json \
            --report-path gitleaks-report.json \
            --exit-code 1 \
            --redact