name: Dependency Scan

on:
  push:
  workflow_call:

jobs:
  snyk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Maven
        uses: stCarolas/setup-maven@v5
        with:
          maven-version: 3.9.6

      - name: Build + resolve dependencies
        working-directory: backend
        run: mvn clean install -DskipTests
        env:
          MAVEN_OPTS: "-Xmx1g -Dmaven.repo.local=$HOME/.m2/repository"

      - name: Install Snyk CLI
        run: |
          ARCH=$(uname -m)
          if [ "$ARCH" = "aarch64" ] || [ "$ARCH" = "arm64" ]; then
            curl -Lo /usr/local/bin/snyk https://static.snyk.io/cli/latest/snyk-linux-arm64
          else
            curl -Lo /usr/local/bin/snyk https://static.snyk.io/cli/latest/snyk-linux
          fi
          chmod +x /usr/local/bin/snyk

      - name: Run Snyk test
        working-directory: backend
        run: snyk test --file=pom.xml --severity-threshold=high --org=diogomartins1221223
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
          MAVEN_OPTS: "-Xmx512m -Dmaven.repo.local=$HOME/.m2/repository"