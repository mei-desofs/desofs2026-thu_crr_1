name: Snyk Scan

on:
  workflow_call:
  workflow_dispatch:

jobs:
  dependency-scanning:
    name: Dependency Vulnerability Scanning
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Make mvnw executable
        run: chmod +x backend/mvnw

      - name: Install Snyk CLI
        run: npm install -g snyk

      - name: Snyk Dependency Scan
        run: |
          snyk test \
            --org=2324a6a0-65da-44fb-922e-340f88ffea53 \
            --severity-threshold=critical \
            --file=backend/pom.xml \
            --sarif-file-output=snyk.sarif
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Upload Dependency Results
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: snyk.sarif

  container-security:
    name: Container Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Snyk CLI
        run: npm install -g snyk

      - name: Build Docker Image
        run: |
          docker build -t techstore:test ./backend

      - name: Run Snyk Container Scan
        run: |
          snyk container test techstore:test \
            --severity-threshold=high \
            --sarif-file-output=snyk-container.sarif
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Upload Container Results
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: snyk-container.sarif