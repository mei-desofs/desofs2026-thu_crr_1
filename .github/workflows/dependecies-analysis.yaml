name: Dependency Scan
on:
  push:
  workflow_call:

jobs:
  snyk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Maven
        uses: stCarolas/setup-maven@v5
        with:
          maven-version: 3.9.6

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: Build + resolve dependencies
        working-directory: backend
        run: mvn clean install -DskipTests

      - name: Run Snyk to check for vulnerabilities
        uses: snyk/actions/maven@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --org=diogomartins1221223
            --sarif-file-output=snyk.sarif

      - name: Find SARIF file
        id: find_sarif
        run: |
          if [ -f backend/snyk.sarif ]; then echo "sarif_path=backend/snyk.sarif" >> $GITHUB_OUTPUT
          elif [ -f snyk.sarif ]; then echo "sarif_path=snyk.sarif" >> $GITHUB_OUTPUT
          else echo "sarif_path=" >> $GITHUB_OUTPUT
          fi

      - name: Upload result to GitHub Code Scanning
        if: steps.find_sarif.outputs.sarif_path != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: ${{ steps.find_sarif.outputs.sarif_path }}

      - name: Upload SARIF artifact
        if: steps.find_sarif.outputs.sarif_path != ''
        uses: actions/upload-artifact@v4
        with:
          name: snyk-sarif
          path: ${{ steps.find_sarif.outputs.sarif_path }}
