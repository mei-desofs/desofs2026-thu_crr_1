name: Snyk Scan
on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  snyk-sast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Snyk
        run: npm install -g snyk
      - name: Authenticate Snyk
        run: snyk auth ${{ secrets.SNYK_TOKEN }}
      - name: Run Snyk Code test (SAST)
        run: snyk code test --org=${{ secrets.SNYK_ORG_ID }}
        working-directory: backend

  snyk-sca:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - name: Install dependencies
        run: mvn clean install -DskipTests
        working-directory: backend
        env:
          MAVEN_OPTS: "-Xmx1536m"
      - name: Install Snyk
        run: npm install -g snyk
      - name: Authenticate Snyk
        run: snyk auth ${{ secrets.SNYK_TOKEN }}
      - name: Run Snyk Open Source test (SCA)
        run: snyk monitor --org=${{ secrets.SNYK_ORG_ID }} --file=pom.xml
        working-directory: backend
        env:
          MAVEN_OPTS: "-Xmx256m -XX:+UseSerialGC"
          JAVA_TOOL_OPTIONS: "-Xmx256m"