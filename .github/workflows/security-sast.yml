name: security-sast.yml
on:
  workflow_call:
    secrets:
      SONAR_TOKEN:
        required: true

jobs:
  sonar:
    name: SonarQube SAST Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Cache SonarCloud packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Build project (skip tests)
        working-directory: backend
        run: mvn clean verify -DskipTests

      - name: Download coverage artifact
        uses: actions/download-artifact@v4
        with:
          name: jacoco-report
          path: backend/target/site/jacoco

      - name: SonarCloud Scan (main/dev with Quality Gate)
        continue-on-error: true
        if: |
          github.ref == 'refs/heads/main' ||
          github.ref == 'refs/heads/dev' ||
          github.base_ref == 'main' ||
          github.base_ref == 'dev'
        working-directory: backend
        run: |
          mvn sonar:sonar \
            -Dsonar.projectKey=techstore-backend-key_techstore \
            -Dsonar.organization=techstore-backend-key \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.token=${{ secrets.SONAR_TOKEN }} \
            -Dsonar.qualitygate.wait=true
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: SonarCloud Scan (feature branches)
        if: |
          github.ref != 'refs/heads/main' && 
          github.ref != 'refs/heads/dev' &&
          github.base_ref != 'main' &&
          github.base_ref != 'dev'
        working-directory: backend
        run: |
          mvn sonar:sonar \
            -Dsonar.projectKey=techstore-backend-key_techstore \
            -Dsonar.organization=techstore-backend-key \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.token=${{ secrets.SONAR_TOKEN }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}