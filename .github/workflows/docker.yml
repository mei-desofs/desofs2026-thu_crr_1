name: Build and Push Docker Image
on:
  push:
    tags:
      - "v*"
  workflow_call:

env:
  BACKEND_IMAGE: diogomartins00/techstore
  FRONTEND_IMAGE: diogomartins00/techstore-frontend

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU (multi-arch support)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Define metadata (backend)
        id: meta-backend
        run: |
          IMAGE="${{ env.BACKEND_IMAGE }}"
          TAGS="$IMAGE:sha-${GITHUB_SHA::7}"
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            TAGS="$IMAGE:${GITHUB_REF_NAME}"
          fi
          if [[ "${GITHUB_REF_TYPE}" == "branch" && "${GITHUB_REF_NAME}" == "main" ]]; then
            TAGS="$TAGS,$IMAGE:latest"
          fi
          if [[ "${GITHUB_REF_TYPE}" == "branch" && "${GITHUB_REF_NAME}" != "main" ]]; then
            TAGS="$TAGS,$IMAGE:${GITHUB_REF_NAME}"
          fi
          echo "tags=$TAGS" >> $GITHUB_OUTPUT

      - name: Define metadata (frontend)
        id: meta-frontend
        run: |
          IMAGE="${{ env.FRONTEND_IMAGE }}"
          TAGS="$IMAGE:sha-${GITHUB_SHA::7}"
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            TAGS="$IMAGE:${GITHUB_REF_NAME}"
          fi
          if [[ "${GITHUB_REF_TYPE}" == "branch" && "${GITHUB_REF_NAME}" == "main" ]]; then
            TAGS="$TAGS,$IMAGE:latest"
          fi
          if [[ "${GITHUB_REF_TYPE}" == "branch" && "${GITHUB_REF_NAME}" != "main" ]]; then
            TAGS="$TAGS,$IMAGE:${GITHUB_REF_NAME}"
          fi
          echo "tags=$TAGS" >> $GITHUB_OUTPUT

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: backend
          file: backend/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max