spring:
  config:
    import: optional:classpath:ratelimit.yaml
  web:
    resources:
      add-mappings: false
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect

  mail:
    host: localhost
    port: 1025

    from:
      email: no-reply@techstore.com
      name: TechStore

    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

supabase:
  url: http://localhost:54321
  service-role-key: dummy-key
  anon-key: anon-key
  redirect-url: http://localhost/callback
  webhook-secret: dummy-webhook-secret
  jwt-secret: not-a-real-secret-for-tests-only-123
  issuer: http://localhost:54321
  jwks-url: http://localhost:54321/auth/v1/.well-known/jwks.json
  jwt-audience: my-app