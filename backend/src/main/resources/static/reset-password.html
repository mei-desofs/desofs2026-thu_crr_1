<!DOCTYPE html>
<html>
<head>
    <title>Set Password</title>
</head>
<body>
<h2>Set your password</h2>
<form id="passwordForm">
    <input type="password" id="password" placeholder="New password" required minlength="8"/>
    <input type="password" id="confirmPassword" placeholder="Confirm password" required/>
    <button type="submit">Set Password</button>
</form>
<p id="message"></p>

<script>
    // Extract token from URL fragment
    const hash = window.location.hash.substring(1);
    const params = new URLSearchParams(hash);
    const accessToken = params.get('access_token');
    const type = params.get('type');

    if (!accessToken || type !== 'invite') {
        document.getElementById('message').textContent = 'Invalid or expired link.';
        document.getElementById('passwordForm').style.display = 'none';
    }

    document.getElementById('passwordForm').addEventListener('submit', async (e) => {
        e.preventDefault();

        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirmPassword').value;

        if (password !== confirmPassword) {
            document.getElementById('message').textContent = 'Passwords do not match.';
            return;
        }

        const response = await fetch('/api/auth/set-password', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': 'Bearer ' + accessToken
            },
            body: JSON.stringify({ password })
        });

        if (response.ok) {
            document.getElementById('message').textContent = 'Password set successfully. You can now log in.';
            document.getElementById('passwordForm').style.display = 'none';
        } else {
            const error = await response.json();
            document.getElementById('message').textContent = error.message || 'Something went wrong.';
        }
    });
</script>
</body>
</html>
