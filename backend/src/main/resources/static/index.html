<!doctype html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TechStore | Email confirmado</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f1729; color: #e2e8f0;
      min-height: 100vh; display: flex;
      align-items: center; justify-content: center; padding: 20px;
    }
    .container {
      text-align: center; max-width: 500px; padding: 40px;
      background: rgba(30,41,59,0.6); border-radius: 16px;
      border: 1px solid rgba(148,163,184,0.2);
    }
    h1 { font-size: 2.5rem; margin-bottom: 12px; }
    .success { color: #22c55e; }
    .error   { color: #ef4444; }
    .loading { color: #94a3b8; }
    p { font-size: 1.1rem; color: #cbd5e1; line-height: 1.6; margin-top: 12px; }
  </style>
</head>
<body>
<div class="container">
  <h1 id="title" class="loading">⏳ A verificar...</h1>
  <p id="message">Por favor aguarda.</p>
</div>

<script>
  (async () => {
    const title   = document.getElementById('title');
    const message = document.getElementById('message');

    // O Supabase manda os params no fragment (#)
    const hash   = window.location.hash.substring(1);
    const params = new URLSearchParams(hash);

    const accessToken = params.get('access_token');
    const type        = params.get('type'); // 'signup' ou 'recovery'

    if (!accessToken || type !== 'signup') {
      title.textContent = '❌ Link inválido';
      title.className   = 'error';
      message.textContent = 'Este link não é válido ou já foi usado.';
      return;
    }

    try {
      const res = await fetch('/api/auth/confirm', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ accessToken })
      });

      if (res.ok) {
        title.textContent = '✓ Email confirmado!';
        title.className   = 'success';
        message.textContent = 'A tua conta foi criada e verificada. Podes fechar esta página.';
      } else {
        const err = await res.json().catch(() => ({}));
        title.textContent = '❌ Erro na confirmação';
        title.className   = 'error';
        message.textContent = err.error || 'Ocorreu um erro. Tenta novamente.';
      }
    } catch (e) {
      title.textContent   = '❌ Erro de ligação';
      title.className     = 'error';
      message.textContent = 'Não foi possível contactar o servidor.';
    }
  })();
</script>
</body>
</html>
