spring:
  application:
    name: TechStore

  profiles:
    active: bootstrap

  config:
    import: optional:classpath:ratelimit.yaml

  datasource:
    url: ${DB_URL}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT}

    from:
      email: ${MAIL_FROM}
      name: ${MAIL_FROM_NAME}

    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 10MB

file:
  upload:
    base-path: ${FILE_UPLOAD_BASE_PATH:./uploads/products}
    max-file-size: ${FILE_UPLOAD_MAX_SIZE:5242880}
    max-files-per-user: ${FILE_UPLOAD_MAX_FILES:20}
    max-image-dimension: ${FILE_UPLOAD_MAX_DIMENSION:4096}
server:
  forward-headers-strategy: framework
  servlet:
    context-path: /api
  port: 8081

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
  show-actuator: true

management:
  endpoints:
    web:
      exposure:
        include: info, health

supabase:
  url: ${SUPABASE_URL}
  anon-key: ${SUPABASE_ANON_KEY}
  service-role-key: ${SUPABASE_SERVICE_ROLE_KEY}
  redirect-url: ${SUPABASE_REDIRECT_URL}
  jwt-secret: ${SUPABASE_JWT_SECRET}
  issuer: ${SUPABASE_ISSUER}
  jwks-url: ${SUPABASE_JWKS_URL}
  jwt-audience: ${SUPABASE_JWT_AUDIENCE}

hibp:
  api:
    url: ${HIPB_URL}
